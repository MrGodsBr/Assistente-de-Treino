<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BT Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1020;
color:white;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
border-bottom:1px solid #24304f;
}

.wrap{
max-width:1100px;
margin:auto;
padding:20px;
}

.hero{
background:#11182b;
border:1px solid #24304f;
border-radius:20px;
padding:20px;
}

button{
height:46px;
border:0;
border-radius:12px;
background:#5d66ff;
color:white;
font-weight:700;
cursor:pointer;
padding:0 16px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:16px;
}

.stat{
background:#11182b;
border:1px solid #24304f;
border-radius:20px;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
margin-top:16px;
}

.panel{
background:#11182b;
border:1px solid #24304f;
border-radius:20px;
padding:20px;
}

.item{
display:flex;
justify-content:space-between;
background:#0b1020;
border:1px solid #24304f;
border-radius:14px;
padding:12px;
margin-top:10px;
}

.muted{
color:#aab4d6;
}

.modalBg{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.modal{
background:#11182b;
border:1px solid #24304f;
border-radius:20px;
padding:20px;
width:400px;
}

.types{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.type{
padding:10px;
background:#0b1020;
border:1px solid #24304f;
border-radius:10px;
cursor:pointer;
}

.type.active{
border-color:#5d66ff;
background:#171f39;
}

input{
width:100%;
height:40px;
margin-top:10px;
background:#0b1020;
border:1px solid #24304f;
border-radius:10px;
color:white;
padding:0 10px;
}

.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.secondary{
background:none;
border:1px solid #24304f;
}

</style>
</head>

<body>

<div class="top">
<strong>BT Dashboard</strong>
</div>

<div class="wrap">

<div class="hero">
<h2>Painel</h2>
<p class="muted">Sistema de contas.</p>

<button onclick="abrirModal()">+ Nova Conta</button>
</div>

<div class="stats">

<div class="stat">
Contas
<h2 id="count">0</h2>
</div>

<div class="stat">
Meta
<h2>100</h2>
</div>

<div class="stat">
Progresso
<h2 id="progress">0%</h2>
</div>

<div class="stat">
Status
<h2 id="status">Iniciando</h2>
</div>

</div>

<div class="grid">

<div class="panel">
<h3>Resumo</h3>
<div id="summary"></div>
</div>

<div class="panel">
<h3>Contas</h3>
<div id="list"></div>
</div>

</div>

</div>

<div id="modalBg" class="modalBg">

<div class="modal">

<h3>Criar Conta</h3>

<input id="nomeConta" placeholder="Nome da conta">

<div class="types" id="types"></div>

<div class="actions">
<button onclick="criarConta()">Criar</button>
<button onclick="fecharModal()" class="secondary">Cancelar</button>
</div>

</div>

</div>

<script>

const tipos=[
"⚪ Normal",
"🏆 Gold",
"💎 Diamond",
"🌈 Rainbow",
"☯️ Yin Yang",
"☢️ Radioactive",
"🍭 Candy",
"🌋 Lava",
"🌌 Galaxy",
"💀 Cursed",
"👑 Divine"
]

let tipoSelecionado=0
let contas=[]

const typesDiv=document.getElementById("types")

function renderTipos(){

typesDiv.innerHTML=""

tipos.forEach((t,i)=>{

let div=document.createElement("div")
div.className="type"+(tipoSelecionado==i?" active":"")

div.innerText=t

div.onclick=()=>{
tipoSelecionado=i
renderTipos()
}

typesDiv.appendChild(div)

})

}

function abrirModal(){
document.getElementById("modalBg").style.display="flex"
}

function fecharModal(){
document.getElementById("modalBg").style.display="none"
}

function criarConta(){

let nome=document.getElementById("nomeConta").value

if(!nome){
alert("Digite nome")
return
}

let tipo=tipos[tipoSelecionado]

contas.unshift({nome,tipo})

document.getElementById("nomeConta").value=""

fecharModal()

render()

}

function render(){

document.getElementById("count").innerText=contas.length

document.getElementById("progress").innerText=Math.min(contas.length,100)+"%"

document.getElementById("status").innerText=contas.length?"Em progresso":"Iniciando"

let lista=document.getElementById("list")

lista.innerHTML=contas.map(c=>`
<div class="item">
<span>${c.nome}</span>
<span>${c.tipo}</span>
</div>
`).join("")

let resumo={}

contas.forEach(c=>{
resumo[c.tipo]=(resumo[c.tipo]||0)+1
})

let sum=document.getElementById("summary")

sum.innerHTML=Object.entries(resumo).map(([t,n])=>`
<div class="item">
<span>${t}</span>
<strong>${n}</strong>
</div>
`).join("")

}

renderTipos()
render()

</script>

</body>
</html>
